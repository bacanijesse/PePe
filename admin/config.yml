backend:
  name: github
  repo: bacanijesse/PePe
  branch: main
  allow_token_auth: true

local_backend: true
site_url: "https://bacanijesse.github.io/PePe/"
display_url: "https://bacanijesse.github.io/PePe/"

media_folder: "assets/uploads"
public_folder: "assets/uploads"

collections:
  - name: "site_data"
    label: "Site Data"
    files:
      - name: "adventures_index"
        label: "Adventure Index"
        file: "data/adventures-index.json"
        format: "json"
        fields:
          - label: "Comment"
            name: "_comment"
            widget: "hidden"
            default: "Lightweight adventure index for homepage cards and stats. Full stories live in adventures/activity_<id>/activity.json."
          - label: "Adventure Index"
            name: "adventures"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Activity ID", name: "activityId", widget: "string", hint: "Example: 21904385848" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Type"
                name: "type"
                widget: "select"
                options: ["ride", "hike"]
              - { label: "Date", name: "date", widget: "string", hint: "Example: Feb 18, 2026" }
              - { label: "Distance", name: "distance", widget: "string", hint: "Example: 12.8 km" }
              - { label: "Elevation", name: "elevation", widget: "string", hint: "Example: 219 m" }
              - { label: "Moving Time", name: "time", widget: "string", hint: "Example: 1h 0m" }
              - { label: "Card Image", name: "image", widget: "image", required: false }
              - { label: "Chart Image", name: "chart", widget: "image", required: false }
              - { label: "GPX File Path", name: "gpx", widget: "string", hint: "Example: adventures/gpx/ride_123.gpx" }
              - { label: "Detail JSON Path", name: "detail", widget: "string", hint: "Example: adventures/activity_123/activity.json" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "activity_21904385848"
        label: "Activity 21904385848"
        file: "adventures/activity_21904385848/activity.json"
        format: "json"
        fields:
          - { label: "Activity ID", name: "activityId", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Type", name: "type", widget: "select", options: ["ride", "hike"] }
          - { label: "Date", name: "date", widget: "string" }
          - { label: "Distance", name: "distance", widget: "string" }
          - { label: "Elevation", name: "elevation", widget: "string" }
          - { label: "Moving Time", name: "time", widget: "string" }
          - { label: "Card Image", name: "image", widget: "image", required: false }
          - { label: "Chart Image", name: "chart", widget: "image", required: false }
          - { label: "GPX File Path", name: "gpx", widget: "string" }
          - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
          - { label: "Description", name: "description", widget: "text" }
          - label: "Gallery Images"
            name: "images"
            widget: "list"
            required: false
            field: { label: "Image Path", name: "path", widget: "string" }
          - label: "Prepared With"
            name: "preparedWith"
            widget: "list"
            required: false
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }
          - label: "Story Paragraphs"
            name: "story"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }

      - name: "activity_21906513266"
        label: "Activity 21906513266"
        file: "adventures/activity_21906513266/activity.json"
        format: "json"
        fields:
          - { label: "Activity ID", name: "activityId", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Type", name: "type", widget: "select", options: ["ride", "hike"] }
          - { label: "Date", name: "date", widget: "string" }
          - { label: "Distance", name: "distance", widget: "string" }
          - { label: "Elevation", name: "elevation", widget: "string" }
          - { label: "Moving Time", name: "time", widget: "string" }
          - { label: "Card Image", name: "image", widget: "image", required: false }
          - { label: "Chart Image", name: "chart", widget: "image", required: false }
          - { label: "GPX File Path", name: "gpx", widget: "string" }
          - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
          - { label: "Description", name: "description", widget: "text" }
          - label: "Gallery Images"
            name: "images"
            widget: "list"
            required: false
            field: { label: "Image Path", name: "path", widget: "string" }
          - label: "Prepared With"
            name: "preparedWith"
            widget: "list"
            required: false
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }
          - label: "Story Paragraphs"
            name: "story"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }

      - name: "quotes"
        label: "Hero Quotes"
        file: "data/quotes.json"
        format: "json"
        fields:
          - label: "Comment"
            name: "_comment"
            widget: "hidden"
            default: "Hero quotes shown randomly on page load."
          - label: "Quotes"
            name: "quotes"
            widget: "list"
            summary: "{{fields.text}}"
            fields:
              - { label: "Quote Text", name: "text", widget: "text" }
              - { label: "Author", name: "author", widget: "string", required: false }

      - name: "testimonials"
        label: "Testimonials"
        file: "data/testimonials.json"
        format: "json"
        fields:
          - label: "Comment"
            name: "_comment"
            widget: "hidden"
            required: false
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - label: "Social Links"
                name: "socials"
                widget: "object"
                required: false
                fields:
                  - { label: "Facebook", name: "facebook", widget: "string", required: false }
                  - { label: "YouTube", name: "youtube", widget: "string", required: false }
                  - { label: "TikTok", name: "tiktok", widget: "string", required: false }

      - name: "trip_essentials"
        label: "Trip Essentials"
        file: "data/trip-essentials.json"
        format: "json"
        fields:
          - label: "Comment"
            name: "_comment"
            widget: "hidden"
            default: "Trip essentials shown in the Planning section on the homepage."
          - label: "Essentials"
            name: "essentials"
            widget: "list"
            summary: "{{fields.icon}} {{fields.title}}"
            fields:
              - { label: "Icon", name: "icon", widget: "string", hint: "Use a short emoji or symbol, for example a battery or medical cross." }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
